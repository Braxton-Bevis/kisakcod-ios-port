name: iOS Stub - Build, Simulator Launch Proof, Device IPA

on:
  push:
    branches: [ main, staging ]
    paths:
      - 'ios/**'
      - 'src/**'
      - 'deps/**'
      - 'scripts/**'
      - '.github/workflows/ios-stub.yml'
  workflow_dispatch:

jobs:
  # Job 1: build for the iOS Simulator, boot one, install + launch the app,
  # and collect hard evidence: a screenshot and the marker file the app writes
  # into its sandbox after presenting its first Metal frame.
  simulator-launch-proof:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Build engine archives (census + smoke + pmove + Com_Init wave)
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch v2.7.1 --recurse-submodules=include/native/directx --shallow-submodules \
            https://github.com/doitsujin/dxvk dxvk-headers
          git -C dxvk-headers apply --verbose "$GITHUB_WORKSPACE/scripts/platform/ios/dxvk-v2.7.1-ios.patch"
          mkdir -p ios/libs/dxvk-include
          cp -R dxvk-headers/include/native/directx ios/libs/dxvk-include/
          cp -R dxvk-headers/include/native/windows ios/libs/dxvk-include/
          ./scripts/platform/ios/build-engine-lib.sh "$PWD/dxvk-headers/include/native" iphonesimulator

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build (iphonesimulator)
        working-directory: ios
        run: |
          set -o pipefail
          mkdir -p ../proof
          xcodebuild \
            -project KisakStub.xcodeproj \
            -scheme KisakStub \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath dd \
            CODE_SIGNING_ALLOWED=NO \
            build | tee ../proof/xcodebuild-simulator.log

      - name: Record Phase 3 archive and scaffold ownership
        working-directory: ios
        run: |
          set -euxo pipefail
          xcrun ar -t libs/iphonesimulator/libkisakcominit.a \
            | tee ../proof/cominit-archive-members.txt
          grep -Fqx 'src_qcommon_common.cpp.o' ../proof/cominit-archive-members.txt
          xcrun nm -gU libs/iphonesimulator/libkisakcominit.a \
            | c++filt | tee ../proof/cominit-defined-symbols.txt
          grep -F 'FS_InitFilesystem()' ../proof/cominit-defined-symbols.txt
          grep -F 'Com_Init(char*)' ../proof/cominit-defined-symbols.txt
          grep -F 'Com_iOS_BootSpineReached()' ../proof/cominit-defined-symbols.txt
          grep -F '_copyDWord(unsigned int*, unsigned int, unsigned int)' ../proof/cominit-defined-symbols.txt
          grep -E ' [A-Za-z] _?(com_dedicated|com_sv_running|useFastFile|com_errorEntered)$' \
            ../proof/cominit-defined-symbols.txt
          xcrun nm -gU libs/iphonesimulator/libkisaksmoke.a \
            | c++filt | tee ../proof/smoke-defined-symbols.txt
          for symbol in Dvar_Init Dvar_RegisterEnum Dvar_EnumToString \
                        Dvar_RegisterString Dvar_SetStringFromSource Dvar_GetString; do
            grep -F "$symbol(" ../proof/smoke-defined-symbols.txt
          done
          find dd/Build/Intermediates.noindex -path '*Objects-normal/arm64/*.o' -print0 \
            | while IFS= read -r -d '' object; do
                echo "=== $object ==="
                xcrun nm -gU "$object" || true
              done | c++filt | tee ../proof/app-object-defined-symbols.txt
          grep -F 'kisak_boot_cominit_stage' ../proof/app-object-defined-symbols.txt
          grep -F 'kisak_boot_probe_after_init' ../proof/app-object-defined-symbols.txt
          ! grep -E ' [Tt] Dvar_(Init|RegisterEnum|EnumToString|RegisterString|SetStringFromSource|GetString)\(' \
            ../proof/app-object-defined-symbols.txt
          ! grep -E ' [Tt] (Com_Error|Com_Printf|Com_PrintError|Com_PrintWarning|Com_DPrintf|Com_StartupVariable|Com_LogFileOpen|Com_Memset|Com_Memcpy|_copyDWord)\(' \
            ../proof/app-object-defined-symbols.txt
          ! grep -E ' [A-Za-z] _?(com_dedicated|com_sv_running|useFastFile|com_errorEntered)$' \
            ../proof/app-object-defined-symbols.txt
          ! grep -F 'kisak_boot_smoke' Stub/*.cpp Stub/*.h Stub/*.swift
          ! grep -Eq '^(int|void|bool|const char \*\*) FS_(LoadStack|FreeFile|HashFileName|ListFiles|Printf|ReadFile)\(' \
            Stub/BootScaffold.cpp

      - name: Boot simulator, install, launch, capture proof
        run: |
          set -euxo pipefail
          APP_BUNDLE_ID=dev.braxton.kisakstub
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices[] | .[] | select(.name | test("^iPhone"))][0].udid')
          echo "Using simulator UDID=$UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl install "$UDID" ios/dd/Build/Products/Debug-iphonesimulator/KisakStub.app
          mkdir -p proof

          # --console-pty remains attached to the app, so capture it in a
          # background subshell and bound the proof window explicitly.
          (
            set +e
            xcrun simctl launch --console-pty "$UDID" "$APP_BUNDLE_ID" \
              2>&1 | tee proof/app-console.txt
            printf '%s\n' "${PIPESTATUS[0]}" > proof/app-launch-exit-code.txt
          ) &
          CONSOLE_CAPTURE_PID=$!
          for second in $(seq 1 30); do
            sleep 1
            if [[ "$second" == 10 ]]; then
              xcrun simctl io "$UDID" screenshot proof/simulator-screenshot-1.png
            elif [[ "$second" == 15 ]]; then
              xcrun simctl io "$UDID" screenshot proof/simulator-screenshot-2.png
            fi
          done

          # Stop an app that survived the bounded window, then reap (or, if
          # simctl itself stayed attached, terminate) the console capture.
          xcrun simctl terminate "$UDID" "$APP_BUNDLE_ID" || true
          for _ in $(seq 1 5); do
            if ! kill -0 "$CONSOLE_CAPTURE_PID" 2>/dev/null; then
              break
            fi
            sleep 1
          done
          if kill -0 "$CONSOLE_CAPTURE_PID" 2>/dev/null; then
            kill "$CONSOLE_CAPTURE_PID" || true
          fi
          wait "$CONSOLE_CAPTURE_PID" || true

          # Preserve process-scoped unified logs and only .ips reports whose
          # contents identify KisakStub. Diagnostics never replace a gate.
          xcrun simctl spawn "$UDID" log show --style compact --last 3m \
            --predicate 'process == "KisakStub" OR eventMessage CONTAINS[c] "dev.braxton.kisakstub"' \
            > proof/simulator-app-log.txt 2>&1 || true
          REPORT_DIR="$HOME/Library/Logs/DiagnosticReports"
          if [[ -d "$REPORT_DIR" ]]; then
            while IFS= read -r -d '' report; do
              if grep -Fqi 'KisakStub' "$report"; then
                cp "$report" "proof/$(basename "$report")"
              fi
            done < <(find "$REPORT_DIR" -maxdepth 1 -type f -name '*.ips' -print0)
          fi

          # HARD ASSERTION: the app only writes this file after successfully
          # presenting a Metal frame. Missing file -> job fails.
          CONTAINER=$(xcrun simctl get_app_container "$UDID" "$APP_BUNDLE_ID" data)
          cat "$CONTAINER/Documents/metal_first_frame.txt" | tee proof/metal_first_frame.txt
          grep -Fqx 'cominit-preflight=dvar enum/external string OK — cold Dvar_Init path' proof/metal_first_frame.txt
          grep -Fqx 'cominit-spine=Com_Init entered — useFastFile=0, dedicated=2, sv/cl tails fenced' proof/metal_first_frame.txt
          grep -Fqx 'boot=hunk OK (4KB tmp alloc rw), dvar OK (bmk4_boot=ipad), cmd OK — 3 stages up' proof/metal_first_frame.txt
          grep -Fqx 'fs=FS_InitFilesystem OK — bundle base, Documents home, write/read/delete OK, no assets' proof/metal_first_frame.txt
          grep -Fqx 'pmove=real bg_pmove OK: walk+jump+land+friction on synthetic z=0' proof/metal_first_frame.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: simulator-launch-proof
          path: proof/
          retention-days: 14

  # Job 2: build the real arm64 device binary (unsigned) and package it as an
  # .ipa. Signing is the human last-mile: Sideloadly on Windows or Xcode on Mac
  # re-signs with a personal Apple ID. See ios/README.md.
  device-ipa-unsigned:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build renderer + engine archives
        run: |
          set -euxo pipefail
          brew install meson ninja glslang
          ./scripts/platform/ios/build-dxvk-ios.sh dxvk-ios-work

          mkdir -p ios/libs/iphoneos ios/libs/dxvk-include
          for archive in libdxvk_d3d9.a libdxso.a libdxvk.a libutil.a \
                         libspirv.a libwsi.a libvkcommon.a libdisplay-info.a; do
            source=$(find dxvk-ios-work/dxvk/build-ios -type f -name "$archive" -print -quit)
            test -n "$source"
            cp "$source" ios/libs/iphoneos/
          done
          cp -R dxvk-ios-work/dxvk/include/native/directx ios/libs/dxvk-include/
          cp -R dxvk-ios-work/dxvk/include/native/windows ios/libs/dxvk-include/

          curl -L --fail --retry 3 \
            https://github.com/KhronosGroup/MoltenVK/releases/download/v1.4.1/MoltenVK-ios.tar \
            -o MoltenVK-ios.tar
          echo "54336b90212c390ed5935c96460aed3bf651ad7d3c0f0e956586ce18e9c0b701  MoltenVK-ios.tar" \
            | shasum -a 256 -c -
          tar -xf MoltenVK-ios.tar
          cp MoltenVK/MoltenVK/static/MoltenVK.xcframework/ios-arm64/libMoltenVK.a \
            ios/libs/iphoneos/

          ./scripts/platform/ios/build-engine-lib.sh \
            "$PWD/dxvk-ios-work/dxvk/include/native" iphoneos

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build (iphoneos, unsigned)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project KisakStub.xcodeproj \
            -scheme KisakStub \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath dd \
            CODE_SIGNING_ALLOWED=NO \
            build | tee xcodebuild-device.log

      - name: Verify binary is arm64-apple-ios and package IPA
        working-directory: ios
        run: |
          set -euxo pipefail
          APP=dd/Build/Products/Release-iphoneos/KisakStub.app
          lipo -info "$APP/KisakStub"
          otool -l "$APP/KisakStub" | grep -A3 LC_BUILD_VERSION
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry KisakStub-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: KisakStub-unsigned-ipa
          path: |
            ios/KisakStub-unsigned.ipa
            ios/xcodebuild-device.log
          retention-days: 14
