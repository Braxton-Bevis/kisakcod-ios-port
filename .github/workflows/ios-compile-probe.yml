name: iOS Engine Compile Probe

# Measures the real arm64-apple-ios error surface of representative engine
# translation units. This job is EXPECTED to report failures — its product is
# the per-file error census artifact, not a green check. The separate
# cmake-configure step proves the -DKISAK_PLATFORM=ios build graph is sound.

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'CMakeLists.txt'
      - '.github/workflows/ios-compile-probe.yml'
  workflow_dispatch:

jobs:
  compile-census:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: CMake configure with KISAK_PLATFORM=ios (must succeed)
        run: |
          set -euxo pipefail
          cmake -B build-ios \
            -DKISAK_PLATFORM=ios \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY

      - name: Per-file compile census (failures expected and recorded)
        run: |
          set -uo pipefail
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          FILES=$(sed -n 's/^ *"\${SRC_DIR}\/\(.*\)".*$/src\/\1/p' scripts/ios/CMakeLists.txt)
          mkdir -p census/logs
          echo -e "file\tstatus\tfirst_error" > census/census.tsv
          for f in $FILES; do
            name=$(echo "$f" | tr '/' '_')
            if xcrun clang++ -target arm64-apple-ios15.0 -isysroot "$SDK" \
                 -std=gnu++20 -fsyntax-only -ferror-limit=25 \
                 -fno-strict-aliasing -fwrapv -fms-extensions -w \
                 -DKISAK_MP -DKISAK_IOS -Isrc -Ideps \
                 "$f" > "census/logs/$name.log" 2>&1; then
              echo -e "$f\tPASS\t-" >> census/census.tsv
            else
              first=$(grep -m1 ' error: ' "census/logs/$name.log" | sed 's/\t/ /g' || true)
              echo -e "$f\tFAIL\t${first:-unknown}" >> census/census.tsv
            fi
          done
          echo '=== CENSUS ==='
          column -t -s $'\t' census/census.tsv

      # Objective 4 (TRANSLATION path) probe: recompile the renderer-facing TUs
      # with DXVK's native d3d9/windows compatibility headers in place of the
      # Windows SDK. Measures how much of the engine's D3D9 usage the
      # D3D9->Vulkan(->MoltenVK->Metal) translation layer can absorb at the
      # source level. Failures expected and recorded, same as the raw census.
      - name: DXVK-native header census (renderer TUs)
        run: |
          set -uo pipefail
          # include/native/directx is a submodule (Joshua-Ashton/mingw-directx-headers) —
          # a plain shallow clone leaves it empty (learned the hard way, run 29169151347)
          git clone --depth 1 --branch v2.7.1 --recurse-submodules=include/native/directx --shallow-submodules \
            https://github.com/doitsujin/dxvk dxvk-headers || \
            git clone --depth 1 --recurse-submodules=include/native/directx --shallow-submodules \
              https://github.com/doitsujin/dxvk dxvk-headers
          D3D9_H=$(find dxvk-headers/include -name d3d9.h | head -n1)
          if [ -z "$D3D9_H" ]; then echo 'BLOCKER: no d3d9.h in dxvk include tree'; find dxvk-headers/include -maxdepth 3 -type d; exit 1; fi
          DXDIR=$(dirname "$D3D9_H")
          WINDIR=$(dirname "$DXDIR")/windows
          echo "Using DXVK headers: $DXDIR and $WINDIR"
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p census/dxvk-logs
          echo -e "file\tstatus\tfirst_error" > census/census-dxvk.tsv
          for f in src/gfx_d3d/r_init.cpp src/gfx_d3d/rb_backend.cpp src/win32/win_configure.cpp; do
            [ -f "$f" ] || continue
            name=$(echo "$f" | tr '/' '_')
            if xcrun clang++ -target arm64-apple-ios15.0 -isysroot "$SDK" \
                 -std=gnu++20 -fsyntax-only -ferror-limit=25 \
                 -fno-strict-aliasing -fwrapv -fms-extensions -w \
                 -DKISAK_MP -DKISAK_IOS -Isrc -Ideps \
                 -isystem "$DXDIR" -isystem "$WINDIR" \
                 "$f" > "census/dxvk-logs/$name.log" 2>&1; then
              echo -e "$f\tPASS\t-" >> census/census-dxvk.tsv
            else
              first=$(grep -m1 ' error: ' "census/dxvk-logs/$name.log" | sed 's/\t/ /g' || true)
              echo -e "$f\tFAIL\t${first:-unknown}" >> census/census-dxvk.tsv
            fi
          done
          echo '=== DXVK CENSUS ==='
          column -t -s $'\t' census/census-dxvk.tsv

      - uses: actions/upload-artifact@v4
        with:
          name: ios-compile-census
          path: census/
          retention-days: 14
