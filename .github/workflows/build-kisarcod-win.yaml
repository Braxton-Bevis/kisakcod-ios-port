name: Windows CMake DirectX Build

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]
  workflow_dispatch:

jobs:
  build:
    name: Build with DirectX SDK
    runs-on: windows-2022
    continue-on-error: ${{ github.ref == 'refs/heads/staging' }}

    strategy:
      matrix:
        config: [Debug, Release]

    env:
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
      DXSDK_PKG: Microsoft.DXSDK.D3DX
      DXSDK_VER: 9.29.952.8

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v4

      - name: Install .NET SDK (for nuget usage)
        id: setup_dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install Python (synthetic FF0a fixture generator)
        id: setup_python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore DXSDK NuGet package
        id: restore_dxsdk
        run: |
          dotnet new classlib -o dxsdk-temp
          cd dxsdk-temp
          dotnet add package $env:DXSDK_PKG --version $env:DXSDK_VER
          cd ..
      
      - name: Extract DXSDK paths from NuGet
        id: dxsdk
        shell: powershell
        run: |
          $pkgPath = Join-Path "${env:NUGET_PACKAGES}" "$env:DXSDK_PKG\$env:DXSDK_VER"
          $libDir = Join-Path $pkgPath "build\native\release\lib\x86"
          $incDir = Join-Path $pkgPath "build\native\include"
          $sdkDir = Join-Path $pkgPath "build\native"
          echo "libDir=$libDir" >> $env:GITHUB_ENV
          echo "incDir=$incDir" >> $env:GITHUB_ENV
          echo "DXSDK_DIR_NUGET=$pkgPath" >> $env:GITHUB_ENV
          echo "DXSDK_DIR=$sdkDir" >> $env:GITHUB_ENV
          Write-Host $pkgPath
          Write-Host $libDir
          Write-Host $incDir
          Write-Host $sdkDir

      - name: Install latest CMake
        id: install_cmake
        uses: lukka/get-cmake@latest

      - name: Configure CMake ${{ matrix.config }}
        id: configure
        run: |
          pushd
          mkdir build-${{ matrix.config }}
          cd build-${{ matrix.config }}
          cmake -G "Visual Studio 17 2022" -A Win32 -DDXSDK_DIR="${{ env.DXSDK_DIR }}" -DCICD=1 -DCMAKE_BUILD_TYPE=${{ matrix.config }} ..
          popd

      - name: Build ${{ matrix.config }}
        id: build_targets
        run: |
          pushd
          cmake --build build-${{ matrix.config }} --config ${{ matrix.config }} --target "KisakCOD-sp"
          cmake --build build-${{ matrix.config }} --config ${{ matrix.config }} --target "KisakCOD-mp"
          cmake --build build-${{ matrix.config }} --config ${{ matrix.config }} --target "KisakCOD-dedi"
          cmake --build build-${{ matrix.config }} --config ${{ matrix.config }} --target "bmk4-ff-oracle"
          cmake --build build-${{ matrix.config }} --config ${{ matrix.config }} --target "bmk4-oracle1"
          popd

      - name: FF0a synthetic dump, byte-stability, and fixture allowlist gate
        id: ff0a_gate
        shell: powershell
        run: |
          $fixtureDir = Join-Path "${{ github.workspace }}" "build-${{ matrix.config }}\ff-oracle-fixtures"
          $outputDir = Join-Path "${{ github.workspace }}" "build-${{ matrix.config }}\ff-oracle-out"
          New-Item -ItemType Directory -Force $fixtureDir, $outputDir | Out-Null

          $fixture = Join-Path $fixtureDir "minimal-empty.ff"
          python tools/ff_oracle/generate_minimal_fixture.py --output $fixture

          $tool = Join-Path "${{ github.workspace }}" "bin\${{ matrix.config }}\bmk4-ff-oracle.exe"
          $dumpA = Join-Path $outputDir "minimal-empty-a.txt"
          $dumpB = Join-Path $outputDir "minimal-empty-b.txt"
          & $tool --fixture-allowlist-root "${{ github.workspace }}" --input $fixture --output $dumpA
          if ($LASTEXITCODE -ne 0) { throw "first FF0a dump failed with exit code $LASTEXITCODE" }
          & $tool --fixture-allowlist-root "${{ github.workspace }}" --input $fixture --output $dumpB
          if ($LASTEXITCODE -ne 0) { throw "second FF0a dump failed with exit code $LASTEXITCODE" }

          $hashA = (Get-FileHash -Algorithm SHA256 $dumpA).Hash.ToLowerInvariant()
          $hashB = (Get-FileHash -Algorithm SHA256 $dumpB).Hash.ToLowerInvariant()
          if ($hashA -cne $hashB) { throw "FF0a dump is not byte-stable: $hashA != $hashB" }
          Set-Content -Path (Join-Path $outputDir "minimal-empty.sha256") -Value $hashA

          $actualLines = Get-Content $dumpA
          $requiredLines = @(
            "schema=bmk4.ff-oracle.v1",
            "container.magic=IWffu100",
            "container.version=5",
            "container.secure=0",
            "container.decompressed_bytes=60",
            "xfile.size=0",
            "xfile.external_size=0",
            "blocks.count=9",
            "assets.total=0",
            "asset_type_counts.observed=1",
            "asset_type_counts.count=0",
            "script_strings.count=0",
            "script_strings.metadata_hash.fnv1a64=a8c7f832281a39c5",
            "delayed_records.observed=1",
            "delayed_records.count=0",
            "delayed_records.bytes=0",
            "external_references.observed=1",
            "external_references.declared_bytes=0",
            "external_references.count=0",
            "targeted_hash.xfile.fnv1a64=6b54ea71af95ef15",
            "targeted_hash.asset_list.fnv1a64=88201fb960ff6465",
            "targeted_hash.decompressed_payload.fnv1a64=f87b38c6cf34ac55",
            "runtime_observation.complete=1"
          )
          foreach ($line in $requiredLines) {
            if ($actualLines -cnotcontains $line) { throw "FF0a dump missing required line: $line" }
          }
          $blockNames = @("temp", "runtime", "large_runtime", "physical_runtime", "virtual", "large", "physical", "vertex", "index")
          for ($index = 0; $index -lt $blockNames.Count; $index++) {
            if ($actualLines -cnotcontains "block[$index].name=$($blockNames[$index])") {
              throw "FF0a dump missing canonical name for block $index"
            }
            if ($actualLines -cnotcontains "block[$index].bytes=0") {
              throw "FF0a dump missing zero size for block $index"
            }
          }
          if (($actualLines | Where-Object { $_ -like "targeted_hash.*.fnv1a64=*" }).Count -ne 3) {
            throw "FF0a dump did not contain exactly three targeted field hashes"
          }

          # The refusal tests WANT stderr output + nonzero exit; under the runner's
          # ErrorActionPreference=Stop, PS 5.1 wraps native stderr in a terminating
          # NativeCommandError before the exit-code checks run. Relax EAP for just
          # these invocations; the explicit exit-code assertions still enforce.
          $savedEap = $ErrorActionPreference
          $ErrorActionPreference = 'Continue'
          $outsideFixture = Join-Path $env:RUNNER_TEMP "bmk4-outside-minimal-empty.ff"
          Copy-Item $fixture $outsideFixture -Force
          & $tool --fixture-allowlist-root "${{ github.workspace }}" --input $outsideFixture --output (Join-Path $outputDir "refused-input.txt") 2>$null
          if ($LASTEXITCODE -ne 3) { throw "outside input was not refused with exit code 3" }

          $outsideOutput = Join-Path $env:RUNNER_TEMP "bmk4-outside-dump.txt"
          & $tool --fixture-allowlist-root "${{ github.workspace }}" --input $fixture --output $outsideOutput 2>$null
          if ($LASTEXITCODE -ne 3) { throw "outside output was not refused with exit code 3" }
          if (Test-Path $outsideOutput) { throw "refused outside output was created" }
          $ErrorActionPreference = $savedEap
          # The wrapper ends the step with `exit $LASTEXITCODE`; the last native
          # call above is the intentional exit-3 refusal. All assertions passed
          # if we reached this line.
          exit 0

      # Oracle 1 (slice 7 / kernel qualification): load the synthetic zone
      # fixtures through the REAL engine loader TUs and gate on the traces.
      # Determinism = double-run byte compare; gate b = fixture 01 agrees
      # with the shipped kernel model; gate c = fixture 02 StringTable block
      # adjudication; refusals must refuse (allowlist exit 3, malformed !=0).
      # Fixture inputs are repo-confined by the allowlist root: no game
      # assets can enter this step or its artifacts.
      - name: Oracle 1 engine loader gate
        id: oracle1_gate
        shell: powershell
        run: |
          $root = "${{ github.workspace }}"
          $tool = Join-Path $root "bin\${{ matrix.config }}\bmk4-oracle1.exe"
          $outDir = Join-Path $root "build-${{ matrix.config }}\oracle1-out"
          New-Item -ItemType Directory -Force $outDir | Out-Null

          # Byte-identity discipline gate: every #ifdef BMK4_ORACLE1 hook in the
          # six instrumented engine TUs must carry an exact #line restoration.
          python tools/oracle1/check_line_discipline.py --repo-root $root
          if ($LASTEXITCODE -ne 0) { throw "oracle1 #line discipline check is red" }

          # Content allowlist: path containment alone does not prove the input
          # is synthetic. Pin every fixture that this gate feeds to the tool
          # against the reviewed tools/zone_fixtures/SHA256SUMS before any run.
          $sums = @{}
          Get-Content (Join-Path $root "tools\zone_fixtures\SHA256SUMS") | ForEach-Object {
            $parts = $_ -split '\s+', 2
            if ($parts.Count -eq 2) { $sums[$parts[1].Trim()] = $parts[0].Trim() }
          }
          function Assert-PinnedFixture([string]$relPath) {
            if (-not $sums.ContainsKey($relPath)) { throw "fixture $relPath is not pinned in SHA256SUMS" }
            $actual = (Get-FileHash -Algorithm SHA256 (Join-Path $root "tools\zone_fixtures\$($relPath -replace '/', '\')") -ErrorAction Stop).Hash.ToLowerInvariant()
            if ($actual -cne $sums[$relPath]) { throw "fixture $relPath content does not match its pinned SHA-256" }
          }
          # Hash helper hardened against the relaxed EAP below: a missing or
          # unreadable trace must throw, never yield $null (two $null hashes
          # would compare equal and silently pass determinism).
          function Get-TraceHash([string]$path) {
            if (-not (Test-Path -LiteralPath $path)) { throw "oracle1 expected trace file is missing: $path" }
            return (Get-FileHash -Algorithm SHA256 -LiteralPath $path -ErrorAction Stop).Hash.ToLowerInvariant()
          }

          # Engine-refusal exits (4/5) and allowlist exits (3) are intentional;
          # relax EAP like the FF0a gate so PS 5.1 does not wrap native stderr
          # in a terminating NativeCommandError. `throw` still enforces. The
          # determinism comparison is trace bytes + exit code (stdout/stderr
          # are diagnostics, not gated artifacts).
          $savedEap = $ErrorActionPreference
          $ErrorActionPreference = 'Continue'

          $fixtures = @(
            "01_rawfile_inline",
            "02_stringtable_script_remap",
            "03_alias_forward",
            "04_cross_block_offset",
            "05_interior_offset",
            "06_delayed_stream_order",
            "07_tagged_union_arm"
          )
          # Zone basenames are recorded per-manifest; fixtures bundled flat
          # into the iOS app use namespaced basenames (K2 regeneration —
          # tools/zone_fixtures/README.md).
          $validNames = @{ "02_stringtable_script_remap" = "fixture02_valid.ff" }
          $exits = @{}
          foreach ($fixture in $fixtures) {
            $validName = if ($validNames.ContainsKey($fixture)) { $validNames[$fixture] } else { "valid.ff" }
            Assert-PinnedFixture "$fixture/$validName"
            $zone = Join-Path $root "tools\zone_fixtures\$fixture\$validName"
            $traceA = Join-Path $outDir "$fixture-a.txt"
            $traceB = Join-Path $outDir "$fixture-b.txt"
            & $tool --fixture-allowlist-root $root --emit-names --zone-name $fixture --input $zone --output $traceA 2>$null
            $exitA = $LASTEXITCODE
            & $tool --fixture-allowlist-root $root --emit-names --zone-name $fixture --input $zone --output $traceB 2>$null
            $exitB = $LASTEXITCODE
            if ($exitA -ne $exitB) { throw "oracle1 $fixture exit codes differ across runs: $exitA vs $exitB" }
            $hashA = Get-TraceHash $traceA
            $hashB = Get-TraceHash $traceB
            if ($hashA -cne $hashB) { throw "oracle1 $fixture trace is not byte-deterministic: $hashA != $hashB" }
            # Closure enforcement: every outcome must be ENGINE-native
            # (0 = loaded, 4 = engine assert, 5 = Com_Error). A scaffold
            # abort (6) or tool error (2/3) is a red closure gap, never a
            # recordable "refusal".
            if ($exitA -notin 0, 4, 5) { throw "oracle1 $fixture exited $exitA (not an engine-native outcome)" }
            $exits[$fixture] = $exitA
            $line = "BMK4_ORACLE1 fixture=$fixture exit=$exitA sha256=$hashA"
            Write-Host $line
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $line
          }

          # Gate b: fixture 01 must load clean and agree with the kernel model.
          $trace01 = Join-Path $outDir "01_rawfile_inline-a.txt"
          if (-not (Select-String -Path $trace01 -Pattern "^ev=zone_loaded" -Quiet)) {
            throw "oracle1 fixture 01 did not complete a clean engine load"
          }
          python tools/oracle1/check_trace.py $trace01 --manifest tools/zone_fixtures/01_rawfile_inline/MANIFEST.json --gate b
          if ($LASTEXITCODE -ne 0) { throw "oracle1 gate b (fixture 01 vs kernel model) is red" }

          # Gate c: fixture 02 StringTable block adjudication (runtime verdict).
          # HISTORY: the ORIGINAL fixture 02 was pinned to the engine assert
          # fence (exit 4) — that pin runtime-CONFIRMED the corpus defect the
          # K0/K1 review flagged (FIXTURE02_VERDICT.md). The K2 wave then
          # REGENERATED the fixture from engine truth (ENGINE_TRACE_02.md;
          # independently the same block-4 answer): the regenerated fixture
          # must LOAD CLEAN — exit pinned to exactly 0, and gate c now pins
          # the full predicted event spine. The runtime trace stays the
          # arbiter: a divergence is a corpus/kernel reconciliation, never a
          # silent expectation edit.
          if ($exits["02_stringtable_script_remap"] -ne 0) {
            throw "oracle1 fixture 02 exited $($exits['02_stringtable_script_remap']), expected a clean engine load (exit 0) of the K2-regenerated fixture"
          }
          $trace02 = Join-Path $outDir "02_stringtable_script_remap-a.txt"
          $verdict = python tools/oracle1/check_trace.py $trace02 --gate c
          $gateC = $LASTEXITCODE
          $verdict | Write-Host
          $verdict | Where-Object { $_ -like "FIXTURE02_*" } | ForEach-Object {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $_
          }
          if ($gateC -ne 0) { throw "oracle1 gate c (fixture 02 adjudication) is red" }

          # Gates must demonstrably fail: malformed twins must refuse with an
          # engine-native nonzero exit that is not the allowlist code 3.
          $malformed = @(
            @("01_rawfile_inline", "malformed_truncated_buffer.ff"),
            @("02_stringtable_script_remap", "fixture02_malformed_bad_script_count.ff")
          )
          foreach ($case in $malformed) {
            Assert-PinnedFixture "$($case[0])/$($case[1])"
            $zone = Join-Path $root "tools\zone_fixtures\$($case[0])\$($case[1])"
            $traceA = Join-Path $outDir "$($case[0])-malformed-a.txt"
            $traceB = Join-Path $outDir "$($case[0])-malformed-b.txt"
            & $tool --fixture-allowlist-root $root --emit-names --zone-name "$($case[0])-malformed" --input $zone --output $traceA 2>$null
            $exitA = $LASTEXITCODE
            & $tool --fixture-allowlist-root $root --emit-names --zone-name "$($case[0])-malformed" --input $zone --output $traceB 2>$null
            $exitB = $LASTEXITCODE
            if ($exitA -ne $exitB) { throw "oracle1 malformed $($case[1]) exit codes differ: $exitA vs $exitB" }
            $hashA = Get-TraceHash $traceA
            $hashB = Get-TraceHash $traceB
            if ($hashA -cne $hashB) { throw "oracle1 malformed $($case[1]) refusal trace is not deterministic" }
            if ($exitA -eq 0) { throw "oracle1 accepted malformed zone $($case[1])" }
            if ($exitA -notin 4, 5) { throw "oracle1 refused malformed zone $($case[1]) with exit $exitA instead of an engine-native refusal" }
            $line = "BMK4_ORACLE1 malformed=$($case[1]) exit=$exitA (engine refusal) sha256=$hashA"
            Write-Host $line
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $line
          }

          # Allowlist refusal (exit 3), FF0a pattern: input outside the root...
          $outsideFixture = Join-Path $env:RUNNER_TEMP "bmk4-outside-oracle1.ff"
          Copy-Item (Join-Path $root "tools\zone_fixtures\01_rawfile_inline\valid.ff") $outsideFixture -Force
          & $tool --fixture-allowlist-root $root --input $outsideFixture --output (Join-Path $outDir "refused-input.txt") 2>$null
          if ($LASTEXITCODE -ne 3) { throw "oracle1 outside input was not refused with exit code 3" }

          # ...and output outside the root.
          $outsideOutput = Join-Path $env:RUNNER_TEMP "bmk4-outside-oracle1-trace.txt"
          & $tool --fixture-allowlist-root $root --input (Join-Path $root "tools\zone_fixtures\01_rawfile_inline\valid.ff") --output $outsideOutput 2>$null
          if ($LASTEXITCODE -ne 3) { throw "oracle1 outside output was not refused with exit code 3" }
          if (Test-Path $outsideOutput) { throw "oracle1 refused outside output was created" }
          $ErrorActionPreference = $savedEap
          # The wrapper ends the step with `exit $LASTEXITCODE`; the last native
          # call above is the intentional exit-3 refusal. All assertions passed
          # if we reached this line.
          exit 0

      - name: Upload Oracle 1 traces (synthetic fixtures only)
        id: upload_oracle1_traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oracle1-traces-${{ matrix.config }}
          path: ${{ github.workspace }}/build-${{ matrix.config }}/oracle1-out/**
          if-no-files-found: ignore
          compression-level: 9
          retention-days: 7

      - id: upload_binaries
        uses: actions/upload-artifact@v4
        with:
          name: KisakCOD-${{ matrix.config }}
          path: ${{ github.workspace }}/bin
          compression-level: 9
          retention-days: 1

      - name: Upload FF0a synthetic oracle dump only
        id: upload_oracle_dump
        uses: actions/upload-artifact@v4
        with:
          name: ff-oracle-${{ matrix.config }}
          path: ${{ github.workspace }}/build-${{ matrix.config }}/ff-oracle-out/**
          if-no-files-found: error
          compression-level: 9
          retention-days: 7

      # The tool binary itself (BMK4 GPL code, no game data) - the Windows
      # coordination seat has no local compiler and runs slice-2 real-zone
      # evidence locally with this exe; raw real-zone dumps never leave that
      # machine.
      - name: Upload FF0a oracle tool binary
        id: upload_oracle_tool
        uses: actions/upload-artifact@v4
        with:
          name: ff-oracle-tool-${{ matrix.config }}
          path: ${{ github.workspace }}/bin/${{ matrix.config }}/bmk4-ff-oracle.exe
          if-no-files-found: error
          retention-days: 7

      # Slice 6 engine half: MSVC-derived KISAK layout manifests diffed against
      # the OAT spike manifests. HARD GATE since the run-29358731938 evidence
      # was adjudicated (docs/LAYOUT_CONFORMANCE.md): the two naming-only union
      # divergences are encoded in the comparator; any NUMERIC divergence fails
      # the build. Runs after the artifact uploads so a red here never blocks
      # slice-2 tooling downloads.
      - name: Layout conformance gate (slice 6)
        id: layout_conformance
        shell: powershell
        run: |
          $line = ""
          $failed = $false
          try {
            & .\tools\layout_conformance\run-windows-ci.ps1 -Configuration ${{ matrix.config }} -DxSdkInclude "$env:incDir"
            $line = "BMK4_LAYOUT_CONFORMANCE=green"
          } catch {
            $line = "BMK4_LAYOUT_CONFORMANCE=red detail=$($_.Exception.Message)"
            $failed = $true
          }
          Write-Host $line
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $line
          if ($failed) { exit 1 }
          exit 0

      - name: Upload layout conformance report
        id: upload_layout_report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layout-conformance-${{ matrix.config }}
          path: |
            ${{ github.workspace }}/build-layout-conformance-${{ matrix.config }}/layout-conformance-report.txt
            ${{ github.workspace }}/build-layout-conformance-${{ matrix.config }}/run1/*.layout
          if-no-files-found: ignore
          retention-days: 7

      - name: Verdict for coordinator
        if: github.ref == 'refs/heads/staging' && always()
        shell: powershell
        env:
          OUTCOME_CHECKOUT: ${{ steps.checkout.outcome }}
          OUTCOME_SETUP_DOTNET: ${{ steps.setup_dotnet.outcome }}
          OUTCOME_SETUP_PYTHON: ${{ steps.setup_python.outcome }}
          OUTCOME_RESTORE_DXSDK: ${{ steps.restore_dxsdk.outcome }}
          OUTCOME_EXTRACT_DXSDK: ${{ steps.dxsdk.outcome }}
          OUTCOME_INSTALL_CMAKE: ${{ steps.install_cmake.outcome }}
          OUTCOME_CONFIGURE: ${{ steps.configure.outcome }}
          OUTCOME_BUILD_TARGETS: ${{ steps.build_targets.outcome }}
          OUTCOME_FF0A_GATE: ${{ steps.ff0a_gate.outcome }}
          OUTCOME_ORACLE1_GATE: ${{ steps.oracle1_gate.outcome }}
          OUTCOME_UPLOAD_ORACLE1_TRACES: ${{ steps.upload_oracle1_traces.outcome }}
          OUTCOME_UPLOAD_BINARIES: ${{ steps.upload_binaries.outcome }}
          OUTCOME_UPLOAD_ORACLE_DUMP: ${{ steps.upload_oracle_dump.outcome }}
          OUTCOME_UPLOAD_ORACLE_TOOL: ${{ steps.upload_oracle_tool.outcome }}
          OUTCOME_LAYOUT_CONFORMANCE: ${{ steps.layout_conformance.outcome }}
        run: |
          $checks = @(
            @($env:OUTCOME_CHECKOUT, "Checkout repository"),
            @($env:OUTCOME_SETUP_DOTNET, "Install .NET SDK (for nuget usage)"),
            @($env:OUTCOME_SETUP_PYTHON, "Install Python (synthetic FF0a fixture generator)"),
            @($env:OUTCOME_RESTORE_DXSDK, "Restore DXSDK NuGet package"),
            @($env:OUTCOME_EXTRACT_DXSDK, "Extract DXSDK paths from NuGet"),
            @($env:OUTCOME_INSTALL_CMAKE, "Install latest CMake"),
            @($env:OUTCOME_CONFIGURE, "Configure CMake ${{ matrix.config }}"),
            @($env:OUTCOME_BUILD_TARGETS, "Build ${{ matrix.config }}"),
            @($env:OUTCOME_FF0A_GATE, "FF0a synthetic dump, byte-stability, and fixture allowlist gate"),
            @($env:OUTCOME_ORACLE1_GATE, "Oracle 1 engine loader gate"),
            @($env:OUTCOME_UPLOAD_ORACLE1_TRACES, "Upload Oracle 1 traces (synthetic fixtures only)"),
            @($env:OUTCOME_UPLOAD_BINARIES, "Upload KisakCOD binaries"),
            @($env:OUTCOME_UPLOAD_ORACLE_DUMP, "Upload FF0a synthetic oracle dump only"),
            @($env:OUTCOME_UPLOAD_ORACLE_TOOL, "Upload FF0a oracle tool binary"),
            @($env:OUTCOME_LAYOUT_CONFORMANCE, "Layout conformance gate (slice 6)")
          )

          $verdict = "BMK4_VERDICT=green"
          foreach ($check in $checks) {
            if ($check[0] -ne "success") {
              $verdict = "BMK4_VERDICT=red step=$($check[1])"
              break
            }
          }

          Write-Host $verdict
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $verdict
