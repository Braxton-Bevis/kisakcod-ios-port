# XcodeGen spec for the KisakCOD iOS stub shell.
# Regenerate the .xcodeproj any time with:  xcodegen generate  (run inside ios/)
# The .xcodeproj is deliberately NOT checked in — this file is the source of truth.
name: KisakStub
options:
  bundleIdPrefix: dev.braxton
  deploymentTarget:
    iOS: "16.0"   # MetalFX (MTLFXSpatialScaler) requires iOS 16; GCVirtualController needs 15
  createIntermediateGroups: true

targets:
  KisakStub:
    type: application
    platform: iOS
    sources:
      - Stub
    info:
      path: Stub/Info.plist
      properties:
        CFBundleDisplayName: BMK4
        UILaunchScreen: {}            # empty launch screen dict -> app gets full native resolution
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
        UIStatusBarHidden: true
        UIViewControllerBasedStatusBarAppearance: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.braxton.kisakstub
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: false
        # Signing: automatic with the free personal team (7-day profiles).
        # CI's unsigned-IPA job overrides these with CODE_SIGNING_ALLOWED=NO.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: NCYQDHQ93F
        # Engine linking: libkisakcod.a is produced per-SDK by
        # scripts/platform/ios/build-engine-lib.sh (not checked in).
        SWIFT_OBJC_BRIDGING_HEADER: Stub/BridgingHeader.h
        LIBRARY_SEARCH_PATHS: ["$(PROJECT_DIR)/libs/$(PLATFORM_NAME)"]
        OTHER_LDFLAGS: ["-lkisaksmoke"]
        # The engine is arm64-only (sse2neon absorbs the SSE layer) — no
        # x86_64 simulator slice exists or is wanted.
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
        # Device builds additionally link the TRANSLATION renderer stack:
        # DXVK d3d9 (+ its component libs, built by build-dxvk-ios.sh with the
        # iOS CAMetalLayer WSI) and MoltenVK static. D3D9Smoke.mm drives it.
        # MoltenVK must be force-loaded AND dead-stripping disabled: DXVK
        # reaches Vulkan only via dlsym at runtime, so no link-time reference
        # exists — the linker would drop the archive members, and -dead_strip
        # would remove the symbols even after -force_load (learned on device:
        # signal 5 inside Direct3DCreate9, zero vk* symbols in the binary).
        DEAD_CODE_STRIPPING: NO
        "OTHER_LDFLAGS[sdk=iphoneos*]": ["-lkisaksmoke", "-ldxvk_d3d9", "-ldxso", "-ldxvk", "-lutil", "-lspirv", "-lwsi", "-lvkcommon", "-ldisplay-info", "-Wl,-force_load,$(PROJECT_DIR)/libs/iphoneos/libMoltenVK.a", "-framework", "IOSurface", "-framework", "CoreGraphics", "-framework", "Metal", "-framework", "QuartzCore"]
        "HEADER_SEARCH_PATHS[sdk=iphoneos*]": ["$(PROJECT_DIR)/libs/dxvk-include/directx", "$(PROJECT_DIR)/libs/dxvk-include/windows"]
