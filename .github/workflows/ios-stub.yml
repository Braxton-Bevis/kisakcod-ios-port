name: iOS Stub - Build, Simulator Launch Proof, Device IPA

on:
  push:
    branches: [ main ]
    paths:
      - 'ios/**'
      - 'src/**'
      - 'deps/**'
      - 'scripts/**'
      - '.github/workflows/ios-stub.yml'
  workflow_dispatch:

jobs:
  # Job 1: build for the iOS Simulator, boot one, install + launch the app,
  # and collect hard evidence: a screenshot and the marker file the app writes
  # into its sandbox after presenting its first Metal frame.
  simulator-launch-proof:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Build engine archives (census + smoke + real pmove)
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch v2.7.1 --recurse-submodules=include/native/directx --shallow-submodules \
            https://github.com/doitsujin/dxvk dxvk-headers
          git -C dxvk-headers apply --verbose "$GITHUB_WORKSPACE/scripts/platform/ios/dxvk-v2.7.1-ios.patch"
          mkdir -p ios/libs/dxvk-include
          cp -R dxvk-headers/include/native/directx ios/libs/dxvk-include/
          cp -R dxvk-headers/include/native/windows ios/libs/dxvk-include/
          ./scripts/platform/ios/build-engine-lib.sh "$PWD/dxvk-headers/include/native" iphonesimulator

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build (iphonesimulator)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project KisakStub.xcodeproj \
            -scheme KisakStub \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath dd \
            CODE_SIGNING_ALLOWED=NO \
            build | tail -n 40

      - name: Boot simulator, install, launch, capture proof
        run: |
          set -euxo pipefail
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices[] | .[] | select(.name | test("^iPhone"))][0].udid')
          echo "Using simulator UDID=$UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl install "$UDID" ios/dd/Build/Products/Debug-iphonesimulator/KisakStub.app
          xcrun simctl launch "$UDID" dev.braxton.kisakstub
          sleep 10
          mkdir -p proof
          xcrun simctl io "$UDID" screenshot proof/simulator-screenshot-1.png
          sleep 5
          xcrun simctl io "$UDID" screenshot proof/simulator-screenshot-2.png
          # HARD ASSERTION: the app only writes this file after successfully
          # presenting a Metal frame. Missing file -> job fails.
          CONTAINER=$(xcrun simctl get_app_container "$UDID" dev.braxton.kisakstub data)
          cat "$CONTAINER/Documents/metal_first_frame.txt" | tee proof/metal_first_frame.txt
          grep -E '^boot=hunk OK .*dvar OK .*cmd OK' proof/metal_first_frame.txt
          grep -Fqx 'pmove=real bg_pmove OK: walk+jump+land+friction on synthetic z=0' proof/metal_first_frame.txt

      - uses: actions/upload-artifact@v4
        with:
          name: simulator-launch-proof
          path: proof/
          retention-days: 14

  # Job 2: build the real arm64 device binary (unsigned) and package it as an
  # .ipa. Signing is the human last-mile: Sideloadly on Windows or Xcode on Mac
  # re-signs with a personal Apple ID. See ios/README.md.
  device-ipa-unsigned:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build renderer + engine archives
        run: |
          set -euxo pipefail
          brew install meson ninja glslang
          ./scripts/platform/ios/build-dxvk-ios.sh dxvk-ios-work

          mkdir -p ios/libs/iphoneos ios/libs/dxvk-include
          for archive in libdxvk_d3d9.a libdxso.a libdxvk.a libutil.a \
                         libspirv.a libwsi.a libvkcommon.a libdisplay-info.a; do
            source=$(find dxvk-ios-work/dxvk/build-ios -type f -name "$archive" -print -quit)
            test -n "$source"
            cp "$source" ios/libs/iphoneos/
          done
          cp -R dxvk-ios-work/dxvk/include/native/directx ios/libs/dxvk-include/
          cp -R dxvk-ios-work/dxvk/include/native/windows ios/libs/dxvk-include/

          curl -L --fail --retry 3 \
            https://github.com/KhronosGroup/MoltenVK/releases/download/v1.4.1/MoltenVK-ios.tar \
            -o MoltenVK-ios.tar
          echo "54336b90212c390ed5935c96460aed3bf651ad7d3c0f0e956586ce18e9c0b701  MoltenVK-ios.tar" \
            | shasum -a 256 -c -
          tar -xf MoltenVK-ios.tar
          cp MoltenVK/MoltenVK/static/MoltenVK.xcframework/ios-arm64/libMoltenVK.a \
            ios/libs/iphoneos/

          ./scripts/platform/ios/build-engine-lib.sh \
            "$PWD/dxvk-ios-work/dxvk/include/native" iphoneos

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build (iphoneos, unsigned)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project KisakStub.xcodeproj \
            -scheme KisakStub \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath dd \
            CODE_SIGNING_ALLOWED=NO \
            build | tail -n 40

      - name: Verify binary is arm64-apple-ios and package IPA
        working-directory: ios
        run: |
          set -euxo pipefail
          APP=dd/Build/Products/Release-iphoneos/KisakStub.app
          lipo -info "$APP/KisakStub"
          otool -l "$APP/KisakStub" | grep -A3 LC_BUILD_VERSION
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry KisakStub-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: KisakStub-unsigned-ipa
          path: ios/KisakStub-unsigned.ipa
          retention-days: 14
