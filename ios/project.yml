# XcodeGen spec for the KisakCOD iOS stub shell.
# Regenerate the .xcodeproj any time with:  xcodegen generate  (run inside ios/)
# The .xcodeproj is deliberately NOT checked in — this file is the source of truth.
name: KisakStub
options:
  bundleIdPrefix: dev.braxton
  deploymentTarget:
    iOS: "16.0"   # MetalFX (MTLFXSpatialScaler) requires iOS 16; GCVirtualController needs 15
  createIntermediateGroups: true

targets:
  KisakStub:
    type: application
    platform: iOS
    sources:
      - Stub
    info:
      path: Stub/Info.plist
      properties:
        CFBundleDisplayName: KisakStub
        UILaunchScreen: {}            # empty launch screen dict -> app gets full native resolution
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
        UIStatusBarHidden: true
        UIViewControllerBasedStatusBarAppearance: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.braxton.kisakstub
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: false
        # Signing: automatic with the free personal team (7-day profiles).
        # CI's unsigned-IPA job overrides these with CODE_SIGNING_ALLOWED=NO.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: NCYQDHQ93F
        # Engine linking: libkisakcod.a is produced per-SDK by
        # scripts/platform/ios/build-engine-lib.sh (not checked in).
        SWIFT_OBJC_BRIDGING_HEADER: Stub/BridgingHeader.h
        LIBRARY_SEARCH_PATHS: ["$(PROJECT_DIR)/libs/$(PLATFORM_NAME)"]
        OTHER_LDFLAGS: ["-lkisaksmoke"]
