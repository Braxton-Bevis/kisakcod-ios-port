name: iOS Engine Compile Probe

# Measures the real arm64-apple-ios error surface of representative engine
# translation units. This job is EXPECTED to report failures — its product is
# the per-file error census artifact, not a green check. The separate
# cmake-configure step proves the -DKISAK_PLATFORM=ios build graph is sound.
#
# The census compiles against DXVK's native D3D9/Win32 compatibility headers
# (the chosen TRANSLATION renderer path: D3D9 -> DXVK -> Vulkan -> MoltenVK ->
# Metal). Raw no-shim numbers were measured in runs 29168930111..29169370283
# and are recorded in PORT_JOURNAL.md.

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'deps/**'
      - 'scripts/**'
      - 'CMakeLists.txt'
      - '.github/workflows/ios-compile-probe.yml'
  workflow_dispatch:

jobs:
  compile-census:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: CMake configure with KISAK_PLATFORM=ios (must succeed)
        run: |
          set -euxo pipefail
          cmake -B build-ios \
            -DKISAK_PLATFORM=ios \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY

      - name: Fetch DXVK native headers (pinned)
        run: |
          set -euxo pipefail
          # include/native/directx is a submodule (Joshua-Ashton/mingw-directx-headers) —
          # a plain shallow clone leaves it empty (learned the hard way, run 29169151347)
          git clone --depth 1 --branch v2.7.1 --recurse-submodules=include/native/directx --shallow-submodules \
            https://github.com/doitsujin/dxvk dxvk-headers || \
            git clone --depth 1 --recurse-submodules=include/native/directx --shallow-submodules \
              https://github.com/doitsujin/dxvk dxvk-headers
          test -f dxvk-headers/include/native/directx/d3d9.h
          test -f dxvk-headers/include/native/windows/windows_base.h

      - name: Per-file compile census (failures expected and recorded)
        run: |
          set -uo pipefail
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          DXDIR=dxvk-headers/include/native/directx
          WINDIR=dxvk-headers/include/native/windows
          FILES=$(sed -n 's/^ *"\${SRC_DIR}\/\(.*\)".*$/src\/\1/p' scripts/ios/CMakeLists.txt)
          mkdir -p census/logs
          echo -e "file\tstatus\tfirst_error" > census/census.tsv
          for f in $FILES; do
            name=$(echo "$f" | tr '/' '_')
            if xcrun clang++ -target arm64-apple-ios15.0 -isysroot "$SDK" \
                 -std=gnu++20 -fsyntax-only -ferror-limit=25 \
                 -fno-strict-aliasing -fwrapv -fms-extensions -fdelayed-template-parsing -w -Wno-c++11-narrowing \
                 -DKISAK_MP -DKISAK_IOS -Isrc -Ideps \
                 -isystem "$DXDIR" -isystem "$WINDIR" \
                 "$f" > "census/logs/$name.log" 2>&1; then
              echo -e "$f\tPASS\t-" >> census/census.tsv
            else
              first=$(grep -m1 ' error: ' "census/logs/$name.log" | sed 's/\t/ /g' || true)
              echo -e "$f\tFAIL\t${first:-unknown}" >> census/census.tsv
            fi
          done
          echo '=== CENSUS ==='
          column -t -s $'\t' census/census.tsv

      - uses: actions/upload-artifact@v4
        with:
          name: ios-compile-census
          path: census/
          retention-days: 14
