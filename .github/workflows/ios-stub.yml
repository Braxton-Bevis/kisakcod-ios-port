name: iOS Stub - Build, Simulator Launch Proof, Device IPA

on:
  push:
    branches: [ main, staging ]
    paths:
      - 'ios/**'
      - 'src/**'
      - 'deps/**'
      - 'scripts/**'
      - '.github/workflows/ios-stub.yml'
  workflow_dispatch:

jobs:
  # Job 1: build for the iOS Simulator, boot one, install + launch the app,
  # and collect hard evidence: a screenshot and the marker file the app writes
  # into its sandbox after presenting its first Metal frame.
  simulator-launch-proof:
    runs-on: macos-15
    timeout-minutes: 30
    continue-on-error: ${{ github.ref == 'refs/heads/staging' }}
    steps:
      - id: checkout
        uses: actions/checkout@v4

      - name: Toolchain versions
        id: toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Build engine archives (census + smoke + pmove + Com_Init wave)
        id: build_archives
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch v2.7.1 --recurse-submodules=include/native/directx --shallow-submodules \
            https://github.com/doitsujin/dxvk dxvk-headers
          git -C dxvk-headers apply --verbose "$GITHUB_WORKSPACE/scripts/platform/ios/dxvk-v2.7.1-ios.patch"
          mkdir -p ios/libs/dxvk-include
          cp -R dxvk-headers/include/native/directx ios/libs/dxvk-include/
          cp -R dxvk-headers/include/native/windows ios/libs/dxvk-include/
          ./scripts/platform/ios/build-engine-lib.sh "$PWD/dxvk-headers/include/native" iphonesimulator

      - name: Install XcodeGen
        id: install_xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        id: generate_project
        working-directory: ios
        run: xcodegen generate

      - name: Build (iphonesimulator)
        id: build_sim
        working-directory: ios
        run: |
          set -o pipefail
          mkdir -p ../proof
          xcodebuild \
            -project KisakStub.xcodeproj \
            -scheme KisakStub \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath dd \
            CODE_SIGNING_ALLOWED=NO \
            build | tee ../proof/xcodebuild-simulator.log

      - name: Record Phase 3 archive and scaffold ownership
        id: record_phase3
        working-directory: ios
        run: |
          set -euxo pipefail
          xcrun ar -t libs/iphonesimulator/libkisakcominit.a \
            | tee ../proof/cominit-archive-members.txt
          grep -Fqx 'src_qcommon_common.cpp.o' ../proof/cominit-archive-members.txt
          grep -Fqx 'src_ios_sys_ios_events.cpp.o' ../proof/cominit-archive-members.txt
          grep -Fqx 'src_universal_dvar_cmds.cpp.o' ../proof/cominit-archive-members.txt
          grep -Fqx 'src_script_scr_memorytree.cpp.o' ../proof/cominit-archive-members.txt
          grep -Fqx 'src_script_scr_stringlist.cpp.o' ../proof/cominit-archive-members.txt
          xcrun nm -gU libs/iphonesimulator/libkisakcominit.a \
            | c++filt | tee ../proof/cominit-defined-symbols.txt
          grep -F 'FS_InitFilesystem()' ../proof/cominit-defined-symbols.txt
          grep -F 'Com_Init(char*)' ../proof/cominit-defined-symbols.txt
          grep -F 'Com_iOS_BootSpineReached()' ../proof/cominit-defined-symbols.txt
          grep -F '_copyDWord(unsigned int*, unsigned int, unsigned int)' ../proof/cominit-defined-symbols.txt
          grep -F 'Sys_QueEvent(unsigned int, sysEventType_t, int, int, int, void*)' \
            ../proof/cominit-defined-symbols.txt
          grep -F 'Sys_GetEvent(sysEvent_t*)' ../proof/cominit-defined-symbols.txt
          grep -F 'Dvar_AddCommands()' ../proof/cominit-defined-symbols.txt
          grep -F 'Dvar_Set_f()' ../proof/cominit-defined-symbols.txt
          grep -F 'Dvar_SetA_f()' ../proof/cominit-defined-symbols.txt
          grep -F 'Com_DvarDump(int, char const*)' ../proof/cominit-defined-symbols.txt
          grep -F 'SL_Init()' ../proof/cominit-defined-symbols.txt
          grep -F 'MT_Init()' ../proof/cominit-defined-symbols.txt
          grep -F 'SL_GetString_(char const*, unsigned int, int)' ../proof/cominit-defined-symbols.txt
          grep -F 'SL_ConvertToString(unsigned int)' ../proof/cominit-defined-symbols.txt
          grep -F 'SL_FindString(char const*)' ../proof/cominit-defined-symbols.txt
          grep -F 'SL_RemoveRefToString(unsigned int)' ../proof/cominit-defined-symbols.txt
          for symbol in scrMemTreeGlob scrMemTreePub scrStringDebugGlob; do
            grep -E " [A-Za-z] _?${symbol}$" ../proof/cominit-defined-symbols.txt
          done
          grep -E ' [A-Za-z] _?info1$' ../proof/cominit-defined-symbols.txt
          grep -E ' [A-Za-z] _?info2$' ../proof/cominit-defined-symbols.txt
          ! grep -E ' [A-Za-z] _?dvarCount$' ../proof/cominit-defined-symbols.txt
          grep -E ' [A-Za-z] _?(com_dedicated|com_sv_running|useFastFile|com_errorEntered)$' \
            ../proof/cominit-defined-symbols.txt
          # Slice 7 FF kernel: exact archive membership and real ownership of
          # the K0/K1 entry points (the app-side smoke may not define them).
          xcrun ar -t libs/iphonesimulator/libkisakff.a \
            | tee ../proof/ffk-archive-members.txt
          test "$(grep -vc '__\.SYMDEF' ../proof/ffk-archive-members.txt)" -eq 1
          grep -Fqx 'src_ios_ff_kernel.cpp.o' ../proof/ffk-archive-members.txt
          xcrun nm -gU libs/iphonesimulator/libkisakff.a \
            | c++filt | tee ../proof/ffk-defined-symbols.txt
          grep -F 'FFK_LoadContainer(unsigned char const*, unsigned long, FFKContainer*)' \
            ../proof/ffk-defined-symbols.txt
          grep -F 'FFK_WalkRawFileZone(FFKContainer const*, FFKRawFileK1*)' \
            ../proof/ffk-defined-symbols.txt
          xcrun nm -gU libs/iphonesimulator/libkisaksmoke.a \
            | c++filt | tee ../proof/smoke-defined-symbols.txt
          for symbol in Dvar_Init Dvar_RegisterEnum Dvar_EnumToString \
                        Dvar_RegisterString Dvar_SetStringFromSource Dvar_GetString; do
            grep -F "$symbol(" ../proof/smoke-defined-symbols.txt
          done
          grep -E ' [A-Za-z] _?dvarCount$' ../proof/smoke-defined-symbols.txt
          find dd/Build/Intermediates.noindex -path '*Objects-normal/arm64/*.o' -print0 \
            | while IFS= read -r -d '' object; do
                echo "=== $object ==="
                xcrun nm -gU "$object" || true
              done | c++filt | tee ../proof/app-object-defined-symbols.txt
          grep -F 'kisak_boot_cominit_stage' ../proof/app-object-defined-symbols.txt
          grep -F 'kisak_boot_probe_after_init' ../proof/app-object-defined-symbols.txt
          grep -F 'kisak_boot_event_smoke' ../proof/app-object-defined-symbols.txt
          grep -F 'kisak_boot_m15_closeout' ../proof/app-object-defined-symbols.txt
          grep -F 'kisak_ff_kernel_smoke' ../proof/app-object-defined-symbols.txt
          ! grep -E ' [Tt] FFK_(LoadContainer|WalkRawFileZone|PayloadBytes|PayloadSize|RefusalName)\(' \
            ../proof/app-object-defined-symbols.txt
          ! grep -E ' [Tt] Dvar_(Init|RegisterEnum|EnumToString|RegisterString|SetStringFromSource|GetString)\(' \
            ../proof/app-object-defined-symbols.txt
          ! grep -E ' [Tt] (Sys_QueEvent|Sys_GetEvent|Dvar_AddCommands|Dvar_Set_f|Dvar_SetA_f|Com_DvarDump)\(' \
            ../proof/app-object-defined-symbols.txt
          ! grep -E ' [Tt] (MT_Init|SL_Init|SL_GetString_|SL_ConvertToString|SL_FindString|SL_RemoveRefToString)\(' \
            ../proof/app-object-defined-symbols.txt
          ! grep -E ' [A-Za-z] _?(scrMemTreeGlob|scrMemTreePub|scrStringDebugGlob)$' \
            ../proof/app-object-defined-symbols.txt
          ! grep -E ' [A-Za-z] _?info[12]$' ../proof/app-object-defined-symbols.txt
          ! grep -E ' [A-Za-z] _?dvarCount$' ../proof/app-object-defined-symbols.txt
          ! grep -E ' [Tt] (Com_Error|Com_Printf|Com_PrintError|Com_PrintWarning|Com_DPrintf|Com_StartupVariable|Com_LogFileOpen|Com_Memset|Com_Memcpy|_copyDWord)\(' \
            ../proof/app-object-defined-symbols.txt
          ! grep -E ' [A-Za-z] _?(com_dedicated|com_sv_running|useFastFile|com_errorEntered)$' \
            ../proof/app-object-defined-symbols.txt
          ! grep -F 'kisak_boot_smoke' Stub/*.cpp Stub/*.h Stub/*.swift
          ! grep -Eq '^(int|void|bool|const char \*\*) FS_(LoadStack|FreeFile|HashFileName|ListFiles|Printf|ReadFile)\(' \
            Stub/BootScaffold.cpp

      - name: Boot simulator, install, launch, capture proof
        id: launch_proof
        run: |
          set -euxo pipefail
          APP_BUNDLE_ID=dev.braxton.kisakstub
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices[] | .[] | select(.name | test("^iPhone"))][0].udid')
          echo "Using simulator UDID=$UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl install "$UDID" ios/dd/Build/Products/Debug-iphonesimulator/KisakStub.app
          mkdir -p proof
          CONTAINER=$(xcrun simctl get_app_container "$UDID" "$APP_BUNDLE_ID" data)
          MARKER="$CONTAINER/Documents/metal_first_frame.txt"
          rm -f "$MARKER"

          # --console-pty remains attached to the app, so capture it in a
          # background subshell and bound the proof window explicitly.
          (
            set +e
            # Keep the first-launch settings panel out of the CI evidence
            # screenshots so the native subsystem HUD remains readable. The
            # argument-domain override does not change the app's default.
            xcrun simctl launch --console-pty "$UDID" "$APP_BUNDLE_ID" \
              -kisak.seenSettings YES \
              2>&1 | tee proof/app-console.txt
            printf '%s\n' "${PIPESTATUS[0]}" > proof/app-launch-exit-code.txt
          ) &
          CONSOLE_CAPTURE_PID=$!

          # Hosted CoreSimulator can take several minutes between accepting a
          # launch command and creating the process. Wait on the native-earned
          # B5 line instead of racing a fixed screenshot timer.
          READY=0
          for second in $(seq 1 360); do
            sleep 1
            if [[ -f "$MARKER" ]] \
                && grep -Fqx 'cominit=Com_Init OK — 4 subsystems up, no assets' "$MARKER"; then
              READY=1
              break
            fi
            if ! kill -0 "$CONSOLE_CAPTURE_PID" 2>/dev/null; then
              break
            fi
          done
          if [[ "$READY" -eq 1 ]]; then
            xcrun simctl io "$UDID" screenshot proof/simulator-screenshot-1.png
            sleep 5
            xcrun simctl io "$UDID" screenshot proof/simulator-screenshot-2.png
          else
            echo 'M15 marker did not earn within 360 seconds' >&2
            xcrun simctl io "$UDID" screenshot proof/simulator-timeout.png || true
          fi

          # Stop an app that survived the bounded window. Bound simctl
          # termination so a diagnostic timeout cannot consume the job, then
          # reap (or terminate) the attached console capture.
          xcrun simctl terminate "$UDID" "$APP_BUNDLE_ID" &
          TERMINATE_PID=$!
          for _ in $(seq 1 15); do
            if ! kill -0 "$TERMINATE_PID" 2>/dev/null; then
              break
            fi
            sleep 1
          done
          if kill -0 "$TERMINATE_PID" 2>/dev/null; then
            kill "$TERMINATE_PID" || true
          fi
          wait "$TERMINATE_PID" || true
          for _ in $(seq 1 5); do
            if ! kill -0 "$CONSOLE_CAPTURE_PID" 2>/dev/null; then
              break
            fi
            sleep 1
          done
          if kill -0 "$CONSOLE_CAPTURE_PID" 2>/dev/null; then
            kill "$CONSOLE_CAPTURE_PID" || true
          fi
          wait "$CONSOLE_CAPTURE_PID" || true

          # Preserve process-scoped unified logs and only .ips reports whose
          # contents identify KisakStub. Diagnostics never replace a gate.
          xcrun simctl spawn "$UDID" log show --style compact --last 10m \
            --predicate 'process == "KisakStub" OR eventMessage CONTAINS[c] "dev.braxton.kisakstub"' \
            > proof/simulator-app-log.txt 2>&1 || true
          REPORT_DIR="$HOME/Library/Logs/DiagnosticReports"
          if [[ -d "$REPORT_DIR" ]]; then
            while IFS= read -r -d '' report; do
              if grep -Fqi 'KisakStub' "$report"; then
                cp "$report" "proof/$(basename "$report")"
              fi
            done < <(find "$REPORT_DIR" -maxdepth 1 -type f -name '*.ips' -print0)
          fi

          # HARD ASSERTION: the app only writes this file after successfully
          # presenting a Metal frame. Missing file -> job fails.
          test "$READY" -eq 1
          cat "$MARKER" | tee proof/metal_first_frame.txt
          grep -Fqx '0' proof/app-launch-exit-code.txt
          grep -Fqx 'cominit-preflight=dvar enum/external string OK — cold Dvar_Init path' proof/metal_first_frame.txt
          grep -Fqx 'cominit-spine=Com_Init entered — useFastFile=0, dedicated=2, sv/cl tails fenced' proof/metal_first_frame.txt
          grep -Fqx 'boot=hunk OK (4KB tmp alloc rw), dvar OK (bmk4_boot=ipad), cmd OK — 3 stages up' proof/metal_first_frame.txt
          grep -Fqx 'fs=FS_InitFilesystem OK — bundle base, Documents home, write/read/delete OK, no assets' proof/metal_first_frame.txt
          grep -Fqx 'net=Netchan+NET_Init OK — loopback only, 1 sockets, msg subsystem up' proof/metal_first_frame.txt
          grep -Fqx 'event=Com_EventLoop OK — queued console event set bmk4_b4_probe=alive, invalid cmd rejected' proof/metal_first_frame.txt
          grep -Fqx 'cominit=Com_Init OK — 4 subsystems up, no assets' proof/metal_first_frame.txt
          grep -Fqx 'pmove=real bg_pmove OK: walk+jump+land+friction on synthetic z=0' proof/metal_first_frame.txt
          grep -Fqx 'ffk=FF kernel K0+K1 OK — fixture01 hashes match oracle, RawFile round trip, refused 4 container + 1 stream + 1 stale' proof/metal_first_frame.txt
          tr -d '\r' < proof/app-console.txt \
            | grep -Eq '^KISAK_M15_DETAIL dvars=(2[5-9]|[3-9][0-9]|[1-9][0-9]{2,}) set=closed dvarlist=1 fs=1 event=1 sl=1$'
          ! find proof -maxdepth 1 -type f -name '*.ips' -print -quit | grep -q .

      - id: upload_proof
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: simulator-launch-proof
          path: proof/
          retention-days: 14

      - name: Verdict for coordinator
        if: github.ref == 'refs/heads/staging' && always()
        env:
          OUTCOME_CHECKOUT: ${{ steps.checkout.outcome }}
          OUTCOME_TOOLCHAIN: ${{ steps.toolchain.outcome }}
          OUTCOME_BUILD_ARCHIVES: ${{ steps.build_archives.outcome }}
          OUTCOME_INSTALL_XCODEGEN: ${{ steps.install_xcodegen.outcome }}
          OUTCOME_GENERATE_PROJECT: ${{ steps.generate_project.outcome }}
          OUTCOME_BUILD_SIM: ${{ steps.build_sim.outcome }}
          OUTCOME_RECORD_PHASE3: ${{ steps.record_phase3.outcome }}
          OUTCOME_LAUNCH_PROOF: ${{ steps.launch_proof.outcome }}
          OUTCOME_UPLOAD_PROOF: ${{ steps.upload_proof.outcome }}
        run: |
          checks=(
            "$OUTCOME_CHECKOUT|Checkout repository"
            "$OUTCOME_TOOLCHAIN|Toolchain versions"
            "$OUTCOME_BUILD_ARCHIVES|Build engine archives (census + smoke + pmove + Com_Init wave)"
            "$OUTCOME_INSTALL_XCODEGEN|Install XcodeGen"
            "$OUTCOME_GENERATE_PROJECT|Generate Xcode project"
            "$OUTCOME_BUILD_SIM|Build (iphonesimulator)"
            "$OUTCOME_RECORD_PHASE3|Record Phase 3 archive and scaffold ownership"
            "$OUTCOME_LAUNCH_PROOF|Boot simulator, install, launch, capture proof"
            "$OUTCOME_UPLOAD_PROOF|Upload simulator launch proof"
          )

          verdict='BMK4_VERDICT=green'
          for check in "${checks[@]}"; do
            outcome=${check%%|*}
            step=${check#*|}
            if [[ "$outcome" != success ]]; then
              verdict="BMK4_VERDICT=red step=$step"
              break
            fi
          done

          echo "$verdict"
          echo "$verdict" >> "$GITHUB_STEP_SUMMARY"

  # Job 2: build the real arm64 device binary (unsigned) and package it as an
  # .ipa. Signing is the human last-mile: Sideloadly on Windows or Xcode on Mac
  # re-signs with a personal Apple ID. See ios/README.md.
  device-ipa-unsigned:
    runs-on: macos-15
    timeout-minutes: 30
    continue-on-error: ${{ github.ref == 'refs/heads/staging' }}
    steps:
      - id: checkout
        uses: actions/checkout@v4

      - name: Build renderer + engine archives
        id: build_renderer
        run: |
          set -euxo pipefail
          brew install meson ninja glslang
          ./scripts/platform/ios/build-dxvk-ios.sh dxvk-ios-work

          mkdir -p ios/libs/iphoneos ios/libs/dxvk-include
          for archive in libdxvk_d3d9.a libdxso.a libdxvk.a libutil.a \
                         libspirv.a libwsi.a libvkcommon.a libdisplay-info.a; do
            source=$(find dxvk-ios-work/dxvk/build-ios -type f -name "$archive" -print -quit)
            test -n "$source"
            cp "$source" ios/libs/iphoneos/
          done
          cp -R dxvk-ios-work/dxvk/include/native/directx ios/libs/dxvk-include/
          cp -R dxvk-ios-work/dxvk/include/native/windows ios/libs/dxvk-include/

          curl -L --fail --retry 3 \
            https://github.com/KhronosGroup/MoltenVK/releases/download/v1.4.1/MoltenVK-ios.tar \
            -o MoltenVK-ios.tar
          echo "54336b90212c390ed5935c96460aed3bf651ad7d3c0f0e956586ce18e9c0b701  MoltenVK-ios.tar" \
            | shasum -a 256 -c -
          tar -xf MoltenVK-ios.tar
          cp MoltenVK/MoltenVK/static/MoltenVK.xcframework/ios-arm64/libMoltenVK.a \
            ios/libs/iphoneos/

          ./scripts/platform/ios/build-engine-lib.sh \
            "$PWD/dxvk-ios-work/dxvk/include/native" iphoneos

          # Lane B device-enablement gates: exact 11-member renderer archive
          # and real ownership of the IW3 R/RB producer/consumer path plus
          # the graduated lifecycle owners (mirrors the sim job's ar/nm
          # style for its exact archives).
          mkdir -p proof-device
          xcrun ar -t ios/libs/iphoneos/libkisakrenderer.a \
            | tee proof-device/renderer-archive-members.txt
          test "$(grep -vc '__\.SYMDEF' proof-device/renderer-archive-members.txt)" -eq 11
          xcrun nm -gU ios/libs/iphoneos/libkisakrenderer.a \
            | c++filt | tee proof-device/renderer-defined-symbols.txt
          for symbol in 'R_GetCommandBuffer(' 'R_iOS_ResetCommandList(' \
                        'R_iOS_QueueDrawTrianglesCommand(' 'RB_DrawTrianglesCmd(' \
                        'RB_EndTessSurface(' 'R_DrawTessTechnique(' \
                        'R_DrawIndexedPrimitive('; do
            grep -F "$symbol" proof-device/renderer-defined-symbols.txt
          done
          for symbol in 'R_InitThreads(' 'R_ComErrorCleanup(' \
                        'R_SyncRenderThread(' 'R_BeginRemoteScreenUpdate(' \
                        'R_EndRemoteScreenUpdate(' 'R_PopRemoteScreenUpdate(' \
                        'R_BeginDebugFrame(' 'R_EndDebugFrame(' \
                        'Sys_DestroySplashWindow('; do
            grep -F "$symbol" proof-device/renderer-defined-symbols.txt
          done

      - name: Install XcodeGen
        id: install_xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        id: generate_project
        working-directory: ios
        run: xcodegen generate

      - name: Build (iphoneos, unsigned)
        id: build_device
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project KisakStub.xcodeproj \
            -scheme KisakStub \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath dd \
            CODE_SIGNING_ALLOWED=NO \
            build | tee xcodebuild-device.log

      - name: Verify binary is arm64-apple-ios and package IPA
        id: package_ipa
        working-directory: ios
        run: |
          set -euxo pipefail
          APP=dd/Build/Products/Release-iphoneos/KisakStub.app
          lipo -info "$APP/KisakStub"
          otool -l "$APP/KisakStub" | grep -A3 LC_BUILD_VERSION
          mkdir -p Payload
          cp -R "$APP" Payload/
          # Lane B device-enablement: the binary that ships in the IPA must
          # carry the scene entry points and the live IW3 R/RB path.
          # nm -U (defined, INCLUDING locals): app-target TUs are built with
          # Xcode Release's symbols-hidden-by-default, so the kisak_* bridges
          # land in the symtab as local 't' — present and live, just not
          # external (CI round 3). Archive-built engine and MoltenVK symbols
          # stay external; the [Tt] class covers both.
          mkdir -p ../proof-device
          xcrun nm -U Payload/KisakStub.app/KisakStub \
            | tee ../proof-device/device-app-defined-symbols.txt
          grep -E ' [Tt] _kisak_renderer_placeholder$' \
            ../proof-device/device-app-defined-symbols.txt
          grep -E ' [Tt] _kisak_renderer_placeholder_detail$' \
            ../proof-device/device-app-defined-symbols.txt
          grep -E ' [Tt] _kisak_d3d9_smoke$' \
            ../proof-device/device-app-defined-symbols.txt
          # The device now dead-strips (bounds the renderer closure); MoltenVK
          # is reached only via dlsym, so prove the explicit -u root held and
          # the Vulkan entries survived stripping BEFORE anyone sideloads.
          grep -E ' [Tt] _vkGetInstanceProcAddr$' \
            ../proof-device/device-app-defined-symbols.txt
          grep -E ' [Tt] _vkCreateInstance$' \
            ../proof-device/device-app-defined-symbols.txt
          grep -E ' [Tt] _vkCreateDevice$' \
            ../proof-device/device-app-defined-symbols.txt
          xcrun nm -U Payload/KisakStub.app/KisakStub | c++filt \
            | tee ../proof-device/device-app-defined-symbols-demangled.txt
          for symbol in 'kisak_renderer_placeholder_run(' 'R_GetCommandBuffer(' \
                        'R_iOS_QueueDrawTrianglesCommand(' 'RB_DrawTrianglesCmd(' \
                        'RB_EndTessSurface(' 'R_DrawTessTechnique(' \
                        'R_DrawIndexedPrimitive('; do
            grep -F "$symbol" ../proof-device/device-app-defined-symbols-demangled.txt
          done
          zip -qry KisakStub-unsigned.ipa Payload

      - id: upload_ipa
        uses: actions/upload-artifact@v4
        with:
          name: KisakStub-unsigned-ipa
          path: |
            ios/KisakStub-unsigned.ipa
            ios/xcodebuild-device.log
            proof-device/
          retention-days: 14

      - name: Verdict for coordinator
        if: github.ref == 'refs/heads/staging' && always()
        env:
          OUTCOME_CHECKOUT: ${{ steps.checkout.outcome }}
          OUTCOME_BUILD_RENDERER: ${{ steps.build_renderer.outcome }}
          OUTCOME_INSTALL_XCODEGEN: ${{ steps.install_xcodegen.outcome }}
          OUTCOME_GENERATE_PROJECT: ${{ steps.generate_project.outcome }}
          OUTCOME_BUILD_DEVICE: ${{ steps.build_device.outcome }}
          OUTCOME_PACKAGE_IPA: ${{ steps.package_ipa.outcome }}
          OUTCOME_UPLOAD_IPA: ${{ steps.upload_ipa.outcome }}
        run: |
          checks=(
            "$OUTCOME_CHECKOUT|Checkout repository"
            "$OUTCOME_BUILD_RENDERER|Build renderer + engine archives"
            "$OUTCOME_INSTALL_XCODEGEN|Install XcodeGen"
            "$OUTCOME_GENERATE_PROJECT|Generate Xcode project"
            "$OUTCOME_BUILD_DEVICE|Build (iphoneos, unsigned)"
            "$OUTCOME_PACKAGE_IPA|Verify binary is arm64-apple-ios and package IPA"
            "$OUTCOME_UPLOAD_IPA|Upload unsigned IPA"
          )

          verdict='BMK4_VERDICT=green'
          for check in "${checks[@]}"; do
            outcome=${check%%|*}
            step=${check#*|}
            if [[ "$outcome" != success ]]; then
              verdict="BMK4_VERDICT=red step=$step"
              break
            fi
          done

          echo "$verdict"
          echo "$verdict" >> "$GITHUB_STEP_SUMMARY"
